# render.yaml — Render.com deployment configuration
# ====================================================
#
# WHY THIS FILE IS CRITICAL
# ──────────────────────────
# Without render.yaml, Render auto-detects the start command as:
#   uvicorn main:app --host 0.0.0.0 --port $PORT
#
# This starts with:
#   • 1 worker (single-threaded event loop)
#   • Default keep-alive timeout (5 seconds) — too short for large PDF uploads
#   • No timeout-graceful-shutdown — active connections are killed on redeploy
#   • No health-check path configured
#   • No environment variable documentation
#
# This file fixes all of the above.
#
# KEY SETTINGS EXPLAINED
# ───────────────────────
# --timeout-keep-alive 120
#   Render's nginx proxy sends keepalive packets every ~75 seconds on long
#   requests. Without this, uvicorn closes the connection after 5 seconds of
#   idle (even mid-response), causing 502 Bad Gateway for large PDF generation
#   that takes 3-5 minutes.
#
# --timeout-graceful-shutdown 30
#   When Render deploys a new version, it sends SIGTERM. Without this, uvicorn
#   kills the process immediately, dropping any in-flight generation jobs.
#   With 30 seconds, active requests have time to complete.
#
# --log-level info
#   Enables request logging in the Render dashboard — essential for debugging
#   large PDF failures without SSH access.

services:
  - type: web
    name: quizgenius-api
    env: python
    region: oregon
    plan: free

    buildCommand: pip install -r requirements.txt

    startCommand: >
      uvicorn main:app
      --host 0.0.0.0
      --port $PORT
      --timeout-keep-alive 120
      --timeout-graceful-shutdown 30
      --log-level info

    healthCheckPath: /ping

    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard — never commit secrets
      - key: SECRET_KEY
        sync: false          # set manually in Render dashboard
      - key: ENVIRONMENT
        value: production
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

    # Render free tier: 512 MB RAM, shared CPU
    # The largest PDF (20MB) produces ~3MB text + 20 chunks in memory.
    # Peak RAM during generation is ~80-120MB — well within free tier limits.
